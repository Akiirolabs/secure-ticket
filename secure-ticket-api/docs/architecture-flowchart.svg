<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1050" viewBox="0 0 1200 1050" role="img" aria-labelledby="title desc">
  <title id="title">Secure Ticket API Architecture Flowchart</title>
  <desc id="desc">High-level request architecture for the Secure Ticket API.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .box { stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .main { fill: #dbeafe; }
      .mw { fill: #ecfdf5; }
      .route { fill: #fff7ed; }
      .service { fill: #fef9c3; }
      .db { fill: #fce7f3; }
      .error { fill: #fee2e2; }
      .text { font: 700 16px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 400 13px Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .label { font: 700 12px Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .line { stroke: #334155; stroke-width: 2.25; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="1050"/>
  <text class="title" x="600" y="48">Secure Ticket API Architecture</text>
  <text class="subtitle" x="600" y="76" text-anchor="middle">Request lifecycle, middleware, future modules, database, logging, and errors</text>

  <rect class="box main" x="470" y="110" width="260" height="76"/>
  <text class="text" x="600" y="142">Client / API Caller</text>
  <text class="small" x="600" y="164">HTTP request</text>

  <rect class="box main" x="470" y="225" width="260" height="76"/>
  <text class="text" x="600" y="257">Express Server</text>
  <text class="small" x="600" y="279">src/server.ts</text>

  <rect class="box main" x="470" y="340" width="260" height="76"/>
  <text class="text" x="600" y="372">App Setup</text>
  <text class="small" x="600" y="394">src/app.ts</text>

  <rect class="box mw" x="110" y="475" width="230" height="92"/>
  <text class="text" x="225" y="507">Security</text>
  <text class="small" x="225" y="530">helmet, cors</text>
  <text class="small" x="225" y="550">express.json</text>

  <rect class="box mw" x="420" y="475" width="260" height="92"/>
  <text class="text" x="550" y="507">Request Tracing</text>
  <text class="small" x="550" y="530">creates requestId</text>
  <text class="small" x="550" y="550">logs request received</text>

  <rect class="box mw" x="760" y="475" width="230" height="92"/>
  <text class="text" x="875" y="507">Rate Limiting</text>
  <text class="small" x="875" y="530">blocks abusive traffic</text>
  <text class="small" x="875" y="550">clean 429 response</text>

  <rect class="box route" x="470" y="625" width="260" height="86"/>
  <text class="text" x="600" y="657">Routes</text>
  <text class="small" x="600" y="680">/health now</text>
  <text class="small" x="600" y="700">/auth and /tickets future</text>

  <rect class="box mw" x="130" y="760" width="230" height="90"/>
  <text class="text" x="245" y="792">Auth Check</text>
  <text class="small" x="245" y="815">JWT verification</text>
  <text class="small" x="245" y="835">req.user assigned</text>

  <rect class="box mw" x="430" y="760" width="230" height="90"/>
  <text class="text" x="545" y="792">Role Check</text>
  <text class="small" x="545" y="815">USER</text>
  <text class="small" x="545" y="835">ANALYST / ADMIN</text>

  <rect class="box service" x="730" y="760" width="230" height="90"/>
  <text class="text" x="845" y="792">Controllers</text>
  <text class="small" x="845" y="815">auth controller</text>
  <text class="small" x="845" y="835">ticket controller</text>

  <rect class="box service" x="470" y="905" width="260" height="70"/>
  <text class="text" x="600" y="935">Services</text>
  <text class="small" x="600" y="957">business logic</text>

  <rect class="box db" x="835" y="905" width="245" height="70"/>
  <text class="text" x="958" y="935">Prisma / SQLite</text>
  <text class="small" x="958" y="957">schema.prisma + dev.db</text>

  <rect class="box error" x="60" y="905" width="245" height="70"/>
  <text class="text" x="183" y="935">Error Handler</text>
  <text class="small" x="183" y="957">clean JSON + requestId</text>

  <line class="line" x1="600" y1="186" x2="600" y2="225"/>
  <line class="line" x1="600" y1="301" x2="600" y2="340"/>
  <line class="line" x1="600" y1="416" x2="600" y2="455"/>
  <line class="line" x1="600" y1="455" x2="225" y2="455"/>
  <line class="line" x1="225" y1="455" x2="225" y2="475"/>
  <line class="line" x1="340" y1="521" x2="420" y2="521"/>
  <line class="line" x1="680" y1="521" x2="760" y2="521"/>
  <line class="line" x1="875" y1="567" x2="875" y2="600"/>
  <line class="line" x1="875" y1="600" x2="600" y2="600"/>
  <line class="line" x1="600" y1="600" x2="600" y2="625"/>

  <line class="line" x1="600" y1="711" x2="600" y2="735"/>
  <line class="line" x1="600" y1="735" x2="245" y2="735"/>
  <line class="line" x1="245" y1="735" x2="245" y2="760"/>
  <line class="line" x1="360" y1="805" x2="430" y2="805"/>
  <line class="line" x1="660" y1="805" x2="730" y2="805"/>
  <line class="line" x1="845" y1="850" x2="845" y2="880"/>
  <line class="line" x1="845" y1="880" x2="600" y2="880"/>
  <line class="line" x1="600" y1="880" x2="600" y2="905"/>
  <line class="line" x1="730" y1="940" x2="835" y2="940"/>

  <line class="line dashed" x1="245" y1="850" x2="245" y2="890"/>
  <line class="line dashed" x1="245" y1="890" x2="183" y2="890"/>
  <line class="line dashed" x1="183" y1="890" x2="183" y2="905"/>
  <line class="line dashed" x1="545" y1="850" x2="545" y2="890"/>
  <line class="line dashed" x1="545" y1="890" x2="305" y2="940"/>
  <line class="line dashed" x1="875" y1="567" x2="1018" y2="700"/>
  <line class="line dashed" x1="1018" y1="700" x2="1018" y2="940"/>
  <line class="line dashed" x1="1018" y1="940" x2="1080" y2="940"/>

  <text class="label" x="400" y="446">middleware chain</text>
  <text class="label" x="362" y="726">protected routes</text>
  <text class="label" x="948" y="890">database calls</text>
  <text class="label" x="168" y="888">errors</text>
</svg>
