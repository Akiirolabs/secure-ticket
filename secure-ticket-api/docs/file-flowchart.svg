<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="980" viewBox="0 0 1300 980" role="img" aria-labelledby="title desc">
  <title id="title">Secure Ticket API File Flowchart</title>
  <desc id="desc">Flowchart showing how the Secure Ticket API files connect.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .box { stroke: #334155; stroke-width: 2; rx: 9; ry: 9; }
      .entry { fill: #dbeafe; }
      .config { fill: #e0f2fe; }
      .middleware { fill: #dcfce7; }
      .utility { fill: #f5f3ff; }
      .module { fill: #fef9c3; }
      .data { fill: #fce7f3; }
      .test { fill: #ffedd5; }
      .text { font: 700 15px Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 400 12px Arial, sans-serif; fill: #334155; text-anchor: middle; }
      .line { stroke: #334155; stroke-width: 2.1; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 6; }
      .group { fill: none; stroke: #cbd5e1; stroke-width: 2; rx: 16; ry: 16; }
      .groupTitle { font: 700 13px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1300" height="980"/>
  <text class="title" x="650" y="46" text-anchor="middle">Secure Ticket API File Flow</text>
  <text class="subtitle" x="650" y="74" text-anchor="middle">How the current files connect, plus where future auth and ticket modules plug in</text>

  <rect class="group" x="50" y="105" width="270" height="225"/>
  <text class="groupTitle" x="72" y="130">ENTRY</text>
  <rect class="box entry" x="85" y="150" width="200" height="58"/>
  <text class="text" x="185" y="174">src/server.ts</text>
  <text class="small" x="185" y="194">starts HTTP server</text>
  <rect class="box entry" x="85" y="250" width="200" height="58"/>
  <text class="text" x="185" y="274">src/app.ts</text>
  <text class="small" x="185" y="294">builds Express app</text>

  <rect class="group" x="380" y="105" width="305" height="360"/>
  <text class="groupTitle" x="402" y="130">CONFIG + LOGGING</text>
  <rect class="box config" x="425" y="150" width="220" height="58"/>
  <text class="text" x="535" y="174">src/config.ts</text>
  <text class="small" x="535" y="194">env validation</text>
  <rect class="box config" x="425" y="250" width="220" height="58"/>
  <text class="text" x="535" y="274">.env</text>
  <text class="small" x="535" y="294">runtime variables</text>
  <rect class="box config" x="425" y="350" width="220" height="58"/>
  <text class="text" x="535" y="374">src/logger.ts</text>
  <text class="small" x="535" y="394">Pino events + audit logs</text>

  <rect class="group" x="745" y="105" width="485" height="360"/>
  <text class="groupTitle" x="767" y="130">MIDDLEWARE</text>
  <rect class="box middleware" x="785" y="150" width="220" height="58"/>
  <text class="text" x="895" y="174">rateLimit.middleware.ts</text>
  <text class="small" x="895" y="194">request throttling</text>
  <rect class="box middleware" x="785" y="250" width="220" height="58"/>
  <text class="text" x="895" y="274">auth.middleware.ts</text>
  <text class="small" x="895" y="294">JWT verification</text>
  <rect class="box middleware" x="785" y="350" width="220" height="58"/>
  <text class="text" x="895" y="374">role.middleware.ts</text>
  <text class="small" x="895" y="394">permission check</text>
  <rect class="box middleware" x="1030" y="250" width="180" height="58"/>
  <text class="text" x="1120" y="274">error.middleware.ts</text>
  <text class="small" x="1120" y="294">JSON error response</text>

  <rect class="group" x="50" y="530" width="350" height="250"/>
  <text class="groupTitle" x="72" y="555">UTILITIES + TYPES</text>
  <rect class="box utility" x="90" y="585" width="260" height="58"/>
  <text class="text" x="220" y="609">src/utils/AppError.ts</text>
  <text class="small" x="220" y="629">known API errors</text>
  <rect class="box utility" x="90" y="685" width="260" height="58"/>
  <text class="text" x="220" y="709">src/types/express.d.ts</text>
  <text class="small" x="220" y="729">requestId and req.user types</text>

  <rect class="group" x="460" y="530" width="385" height="250"/>
  <text class="groupTitle" x="482" y="555">FUTURE FEATURE MODULES</text>
  <rect class="box module" x="505" y="585" width="290" height="58"/>
  <text class="text" x="650" y="609">src/modules/auth/*</text>
  <text class="small" x="650" y="629">routes, controller, service, schema</text>
  <rect class="box module" x="505" y="685" width="290" height="58"/>
  <text class="text" x="650" y="709">src/modules/tickets/*</text>
  <text class="small" x="650" y="729">routes, controller, service, schema</text>

  <rect class="group" x="905" y="530" width="280" height="250"/>
  <text class="groupTitle" x="927" y="555">DATABASE</text>
  <rect class="box data" x="945" y="585" width="200" height="58"/>
  <text class="text" x="1045" y="609">future src/db.ts</text>
  <text class="small" x="1045" y="629">Prisma client wrapper</text>
  <rect class="box data" x="945" y="685" width="200" height="58"/>
  <text class="text" x="1045" y="709">schema.prisma</text>
  <text class="small" x="1045" y="729">User + Ticket models</text>

  <rect class="group" x="330" y="835" width="620" height="115"/>
  <text class="groupTitle" x="352" y="860">TESTS</text>
  <rect class="box test" x="370" y="885" width="170" height="48"/>
  <text class="text" x="455" y="914">jest.config.js</text>
  <rect class="box test" x="570" y="885" width="170" height="48"/>
  <text class="text" x="655" y="914">tests/setup.ts</text>
  <rect class="box test" x="770" y="885" width="170" height="48"/>
  <text class="text" x="855" y="907">middleware</text>
  <text class="small" x="855" y="925">*.test.ts</text>

  <line class="line" x1="185" y1="208" x2="185" y2="250"/>
  <line class="line" x1="285" y1="279" x2="425" y2="179"/>
  <line class="line" x1="285" y1="279" x2="425" y2="379"/>
  <line class="line" x1="645" y1="179" x2="785" y2="179"/>
  <line class="line" x1="285" y1="279" x2="785" y2="179"/>
  <line class="line dashed" x1="285" y1="279" x2="785" y2="279"/>
  <line class="line dashed" x1="285" y1="279" x2="785" y2="379"/>
  <line class="line dashed" x1="1005" y1="279" x2="1030" y2="279"/>
  <line class="line dashed" x1="1005" y1="379" x2="1120" y2="379"/>
  <line class="line dashed" x1="1120" y1="379" x2="1120" y2="308"/>
  <line class="line" x1="1005" y1="179" x2="1060" y2="179"/>
  <line class="line" x1="1060" y1="179" x2="1060" y2="250"/>

  <line class="line" x1="895" y1="308" x2="350" y2="614"/>
  <line class="line" x1="895" y1="308" x2="350" y2="714"/>
  <line class="line" x1="895" y1="408" x2="350" y2="714"/>
  <line class="line" x1="1120" y1="308" x2="350" y2="614"/>
  <line class="line" x1="645" y1="379" x2="1030" y2="279"/>

  <line class="line dashed" x1="285" y1="308" x2="505" y2="614"/>
  <line class="line dashed" x1="285" y1="308" x2="505" y2="714"/>
  <line class="line dashed" x1="795" y1="614" x2="945" y2="614"/>
  <line class="line dashed" x1="795" y1="714" x2="945" y2="614"/>
  <line class="line" x1="1045" y1="643" x2="1045" y2="685"/>

  <line class="line" x1="540" y1="909" x2="570" y2="909"/>
  <line class="line" x1="740" y1="909" x2="770" y2="909"/>
</svg>
